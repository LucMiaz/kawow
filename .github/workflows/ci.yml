name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest + pylint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install RDKit and package dependencies
        run: |
          pip install --upgrade pip
          pip install rdkit
          pip install -e ".[dev,lint]"

      - name: Run pytest
        run: pytest tests/ -v --tb=short

      - name: Run pylint
        run: |
          pylint kawow/ \
            --fail-under=8.0
